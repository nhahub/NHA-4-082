
<h2 class="sr-only">SalesPulse 360 Galaxy Schema ERD with all tables, columns, and relationships</h2>
<style>
#erd { padding: 8px 0; }
#erd svg { width: 100% !important; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2040' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#0d2a1e' : '#E1F5EE',
    secondaryBorderColor: dark ? '#0F6E56' : '#0F6E56',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#1a1a2e' : '#f0f0ff',
    tertiaryBorderColor: dark ? '#444' : '#ccc',
  },
});

const diagram = `erDiagram

  Fact_OrderLifeCycle {
    string order_id PK
    string customer_id FK
    string review_id FK
    int date_id FK
    string product_id FK
    string seller_id FK
    string order_status
    timestamp order_purchase_timestamp
    timestamp order_approved_at
    timestamp order_delivered_carrier_date
    timestamp order_delivered_customer_date
    timestamp order_estimated_delivery_date
    int delivery_delay_days
    double total_payment_value
    int payment_methods_count
    int review_score
    double total_items_price
    double total_freight_value
    double total_order_value
    int total_items_count
    boolean is_late
    boolean is_delivered
  }

  Fact_OrderPayments {
    string payment_key PK
    string order_id FK
    int payment_sequential
    string payment_type
    int payment_installments
    double payment_value
  }

  Dim_Date {
    int date_id PK
    date full_date
    int year
    int quarter
    int month
    string month_name
    int day
    int day_of_week
    string day_name
    boolean is_weekend
  }

  Dim_Customers {
    string customer_id PK
    string customer_unique_id
    int customer_zip_code_prefix FK
    string customer_city
    string customer_state
  }

  Dim_Products {
    string product_id PK
    string product_category_name
    string product_category_name_english
    int product_photos_qty
    double product_weight_g
    double product_length_cm
    double product_height_cm
    double product_width_cm
    double product_volume_cm3
  }

  Dim_Sellers {
    string seller_id PK
    int seller_zip_code_prefix
    string seller_city
    string seller_state
  }

  Dim_Reviews {
    string review_id PK
    string order_id FK
    int review_score
    string review_comment_message
    timestamp review_creation_date
    timestamp review_answer_timestamp
    string review_sentiment
    boolean has_comment
  }

  Dim_Geolocation {
    int geolocation_zip_code_prefix PK
    string geolocation_city
    string geolocation_state
    double latitude
    double longitude
  }

  Fact_OrderLifeCycle }o--|| Dim_Date : "date_id"
  Fact_OrderLifeCycle }o--|| Dim_Customers : "customer_id"
  Fact_OrderLifeCycle }o--|| Dim_Reviews : "review_id"
  Fact_OrderLifeCycle }o--|| Dim_Products : "product_id"
  Fact_OrderLifeCycle }o--|| Dim_Sellers : "seller_id"
  Fact_OrderPayments  }o--|| Fact_OrderLifeCycle : "order_id"
  Dim_Customers       }o--|| Dim_Geolocation : "zip_code_prefix"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
